[pytest]
testpaths = tests
addopts = -v -n auto --dist loadgroup --cov=mcp_stata --cov-report=term-missing
asyncio_mode = strict
timeout = 300
markers =
    requires_stata: marks tests as requiring a local Stata installation
    integration: marks tests as integration tests
    perf: performance benchmark tests (deselect with '-m "not perf"')
    slow: marks tests as slow-running
    xdist_group: group tests to run on the same xdist worker
